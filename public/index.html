    <!--
      Speculation Rules API (Chromium 122+) — prerender same-origin links
      on hover/pointerdown. Pre-rendered HTML by react-snap already exists
      per-route, so navigation становится почти мгновенной.
    -->
    <script type="speculationrules">
    {
      "prerender": [
        {
          "where": {
            "and": [
              { "href_matches": "/*" },
              { "not": { "href_matches": "/static/*" } },
              { "not": { "href_matches": "/finances/*" } },
              { "not": { "href_matches": "/sitemap*" } },
              { "not": { "href_matches": "/llms*" } },
              { "not": { "href_matches": "/*.pdf" } },
              { "not": { "href_matches": "/*.xlsx" } },
              { "not": { "href_matches": "/*.zip" } }
            ]
          },
          "eagerness": "conservative"
        }
      ]
    }
    </script>
